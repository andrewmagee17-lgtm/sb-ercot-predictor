name: Fetch ERCOT ESR Data

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages

      - name: Fetch ERCOT ESR data + 10-day history
        run: |
          python3 - << 'PYEOF'
          import urllib.request, json, datetime, time

          BASE = 'https://www.ercot.com/api/1/services/read/dashboards/energy-storage-resources.json'
          HEADERS = {
            'Accept': 'application/json',
            'User-Agent': 'Mozilla/5.0 (compatible; ERCOT-Data-Fetcher/1.0)',
            'Referer': 'https://www.ercot.com/gridmktinfo/dashboards/energystorageresources'
          }

          def fetch_json(url):
            req = urllib.request.Request(url, headers=HEADERS)
            with urllib.request.urlopen(req, timeout=15) as r:
              return json.loads(r.read())

          now_utc = datetime.datetime.now(datetime.timezone.utc)

          # ── Current snapshot ──────────────────────────────────
          try:
            raw = fetch_json(BASE)
            current = raw.get('currentDay', {}).get('data', []) or raw.get('currentDay', [])
            prev    = raw.get('previousDay', {}).get('data', []) or raw.get('previousDay', [])
            all_pts = prev + current

            latest = current[-1] if current else (prev[-1] if prev else {})
            snap = {
              'discharge_mw': round(abs(float(latest.get('totalDischarging', 0)))),
              'charge_mw':    round(abs(float(latest.get('totalCharging', 0)))),
              'net_mw':       round(float(latest.get('netOutput', 0))),
              'timestamp':    latest.get('timestamp', ''),
              'status':       'live',
              'source':       'ERCOT ESR Dashboard (live)',
              'fetched_utc':  now_utc.isoformat(),
            }
          except Exception as e:
            snap = {'status': 'error', 'error': str(e),
                    'fetched_utc': now_utc.isoformat(), 'source': 'ERCOT ESR'}
            all_pts = []

          # ── Build 10-day hourly profile ────────────────────────
          # We have up to 2 days from the live endpoint (previousDay + currentDay).
          # For the other 8 days we load the existing history file and append.
          HISTORY_FILE = 'history.json'
          try:
            with open(HISTORY_FILE) as f:
              history = json.load(f)
          except Exception:
            history = []

          # Parse the two days we just got
          new_pts = []
          for pt in all_pts:
            try:
              ts  = pt.get('timestamp', '')
              dis = abs(float(pt.get('totalDischarging', 0)))
              chg = abs(float(pt.get('totalCharging', 0)))
              new_pts.append({'ts': ts, 'dis': round(dis), 'chg': round(chg),
                              'net': round(dis - chg)})
            except Exception:
              pass

          # Merge: deduplicate by timestamp, keep newest 10 days (~2880 five-min pts)
          existing_ts = {p['ts'] for p in history}
          for pt in new_pts:
            if pt['ts'] not in existing_ts:
              history.append(pt)
              existing_ts.add(pt['ts'])

          # Trim to last 10 days
          cutoff = now_utc - datetime.timedelta(days=10)
          history = [p for p in history if p['ts'] >= cutoff.isoformat()[:16]]
          history.sort(key=lambda p: p['ts'])

          # ── Build hourly SoC profile from history ─────────────
          # For each hour-of-day (0-23), compute average net MW.
          # Cumulative sum of net gives relative SoC trajectory.
          # Normalize so trough = 0%, peak = 100%.
          from collections import defaultdict
          hour_net = defaultdict(list)
          for pt in history:
            try:
              hr = int(pt['ts'][11:13])   # extract hour from timestamp string
              hour_net[hr].append(pt['net'])
            except Exception:
              pass

          hourly_avg = {}
          for hr in range(24):
            vals = hour_net.get(hr, [])
            hourly_avg[hr] = round(sum(vals)/len(vals)) if vals else 0

          # Integrate net to get relative SoC curve
          soc_raw = []
          cumulative = 0
          for hr in range(24):
            cumulative += hourly_avg[hr]
            soc_raw.append(cumulative)

          soc_min, soc_max = min(soc_raw), max(soc_raw)
          soc_range = soc_max - soc_min if soc_max != soc_min else 1

          # Normalize 0-100
          hourly_soc = {}
          for hr in range(24):
            hourly_soc[hr] = round((soc_raw[hr] - soc_min) / soc_range * 100)

          # Current hour estimated SoC
          cdt_offset = datetime.timezone(datetime.timedelta(hours=-5))
          now_cdt = now_utc.astimezone(cdt_offset)
          current_hour = now_cdt.hour
          estimated_soc = hourly_soc.get(current_hour, 50)

          snap['estimated_soc']    = estimated_soc
          snap['hourly_soc']       = hourly_soc
          snap['hourly_avg_net']   = hourly_avg
          snap['history_pts']      = len(history)
          snap['history_days']     = round(len(history) * 5 / 1440, 1)

          # ── Write files ────────────────────────────────────────
          with open('data.json', 'w') as f:
            json.dump(snap, f, indent=2)

          with open(HISTORY_FILE, 'w') as f:
            json.dump(history, f)

          print(f"Written data.json | SoC hour {current_hour}: {estimated_soc}% | "
                f"History: {len(history)} pts ({snap['history_days']} days)")
          PYEOF

      - name: Commit and push
        run: |
          git config user.name "ERCOT Data Bot"
          git config user.email "action@github.com"
          git add data.json history.json
          git diff --staged --quiet || git commit -m "ERCOT ESR update $(date -u +'%H:%M UTC')"
          git push
