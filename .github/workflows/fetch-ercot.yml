name: Fetch ERCOT ESR Data

on:
  schedule:
    # Run every 5 minutes - multiple entries increases reliability on GitHub's scheduler
    - cron: '0,5,10,15,20,25,30,35,40,45,50,55 * * * *'
  workflow_dispatch:
  # Also trigger on push to main to self-heal after deploys
  push:
    branches: [main]

permissions:
  contents: write
  actions: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch ERCOT ESR data + build SoC model
        run: |
          python3 - << 'PYEOF'
          import urllib.request, json, datetime, sys
          from collections import defaultdict

          BASE = 'https://www.ercot.com/api/1/services/read/dashboards/energy-storage-resources.json'
          HEADERS = {
            'Accept': 'application/json',
            'User-Agent': 'Mozilla/5.0 (compatible; ERCOT-Data-Fetcher/1.0)',
            'Referer': 'https://www.ercot.com/gridmktinfo/dashboards/energystorageresources'
          }

          now_utc = datetime.datetime.now(datetime.timezone.utc)
          cdt     = datetime.timezone(datetime.timedelta(hours=-5))
          now_cdt = now_utc.astimezone(cdt)

          print(f"Fetching at {now_utc.strftime('%H:%M:%S UTC')} ({now_cdt.strftime('%H:%M CDT')})")

          # ── Fetch current snapshot ─────────────────────────────
          try:
            req = urllib.request.Request(BASE, headers=HEADERS)
            with urllib.request.urlopen(req, timeout=15) as r:
              raw = json.loads(r.read())

            current = raw.get('currentDay',  {}).get('data', []) or raw.get('currentDay',  [])
            prev    = raw.get('previousDay', {}).get('data', []) or raw.get('previousDay', [])
            all_pts = prev + current

            print(f"ERCOT returned {len(current)} current + {len(prev)} previous intervals")

            # Get the most recent interval
            latest = current[-1] if current else (prev[-1] if prev else {})
            dis  = round(abs(float(latest.get('totalDischarging', 0))))
            chg  = round(abs(float(latest.get('totalCharging',    0))))
            net  = round(float(latest.get('netOutput', dis - chg)))
            ts   = latest.get('timestamp', now_cdt.isoformat())

            print(f"Latest interval: {ts} | D={dis}MW C={chg}MW Net={net}MW")

            snap = {
              'discharge_mw': dis, 'charge_mw': chg, 'net_mw': net,
              'timestamp': ts, 'status': 'live',
              'source': 'ERCOT ESR Dashboard (live)',
              'fetched_utc': now_utc.isoformat(),
            }
          except Exception as e:
            print(f"ERROR fetching ERCOT: {e}", file=sys.stderr)
            dis, chg, net = 0, 0, 0
            all_pts = []
            snap = {
              'discharge_mw': 0, 'charge_mw': 0, 'net_mw': 0,
              'status': 'error', 'error': str(e),
              'fetched_utc': now_utc.isoformat(),
              'source': f'ERCOT ESR (error: {e})'
            }

          # ── Load + update history ──────────────────────────────
          HISTORY_FILE = 'history.json'
          try:
            with open(HISTORY_FILE) as f:
              history = json.load(f)
            print(f"Loaded {len(history)} existing history points")
          except Exception:
            history = []
            print("No existing history, starting fresh")

          existing_ts = {p['ts'] for p in history}
          added = 0
          for pt in all_pts:
            try:
              ts_  = pt.get('timestamp', '')
              d    = abs(float(pt.get('totalDischarging', 0)))
              c    = abs(float(pt.get('totalCharging',    0)))
              n    = float(pt.get('netOutput', d - c))
              if ts_ and ts_ not in existing_ts:
                history.append({'ts': ts_, 'dis': round(d), 'chg': round(c), 'net': round(n)})
                existing_ts.add(ts_)
                added += 1
            except Exception:
              pass

          print(f"Added {added} new history points")

          # Keep last 10 days only
          cutoff = now_utc - datetime.timedelta(days=10)
          before = len(history)
          history = [p for p in history if p['ts'] >= cutoff.isoformat()[:16]]
          history.sort(key=lambda p: p['ts'])
          print(f"History: {before} → {len(history)} pts after 10d trim")

          # ── Build hourly SoC profile ───────────────────────────
          # net = discharge - charge
          # Positive net = net discharging = SoC falling
          # Negative net = net charging   = SoC rising
          # SoC delta for each interval ∝ -net

          hour_net = defaultdict(list)
          for pt in history:
            try:
              ts_str = pt['ts']
              # ERCOT timestamps are in CDT format e.g. "2026-04-08 14:30:00-0500"
              if '+' in ts_str or ts_str.endswith('Z'):
                dt = datetime.datetime.fromisoformat(ts_str.replace('Z','+00:00'))
                hr = dt.astimezone(cdt).hour
              elif '-' in ts_str[10:]:  # has timezone offset like -0500
                dt = datetime.datetime.fromisoformat(ts_str)
                hr = dt.hour  # already local
              else:
                # Assume CDT
                hr = int(ts_str[11:13])
              hour_net[hr].append(pt['net'])
            except Exception as ex:
              pass

          hourly_avg_net = {}
          for hr in range(24):
            vals = hour_net.get(hr, [])
            hourly_avg_net[hr] = round(sum(vals)/len(vals)) if vals else 0

          # Spring Texas prior - fallback when history is sparse
          spring_prior = {
            0:48,1:46,2:44,3:42,4:40,5:40,
            6:45,7:52,8:60,9:68,10:76,11:83,
            12:88,13:91,14:92,15:90,16:82,
            17:65,18:45,19:30,20:22,21:18,
            22:20,23:26
          }

          if len(history) >= 100:
            # Enough data — build from history
            # Integrate: SoC change = -net (charging raises SoC)
            soc_raw = []
            cumulative = 0
            for hr in range(24):
              delta = -hourly_avg_net[hr]
              cumulative += delta
              soc_raw.append(cumulative)

            raw_min = min(soc_raw)
            raw_max = max(soc_raw)
            raw_range = raw_max - raw_min if raw_max != raw_min else 1

            SOC_FLOOR = 10
            SOC_CEIL  = 92
            hourly_soc = {}
            for hr in range(24):
              norm = (soc_raw[hr] - raw_min) / raw_range
              hourly_soc[hr] = round(SOC_FLOOR + norm * (SOC_CEIL - SOC_FLOOR))
            print("Using history-derived SoC curve")
          else:
            # Use spring prior until enough data
            hourly_soc = spring_prior
            print(f"Using spring prior (only {len(history)} pts, need 100)")

          # Current SoC estimate
          current_hour = now_cdt.hour
          history_soc  = hourly_soc.get(current_hour, 50)

          # Rate adjustment: deviation from hourly average
          typical_net  = hourly_avg_net.get(current_hour, 0)
          deviation    = net - typical_net
          rate_adj     = -round(deviation / 1000 * 2.5)
          rate_adj     = max(-15, min(15, rate_adj))
          estimated_soc = max(5, min(98, history_soc + rate_adj))

          print(f"Hour {current_hour} CDT | History SoC: {history_soc}% | Rate adj: {rate_adj:+}% | Final: {estimated_soc}%")

          snap['estimated_soc']    = estimated_soc
          snap['history_soc']      = history_soc
          snap['hourly_soc']       = hourly_soc
          snap['hourly_avg_net']   = hourly_avg_net
          snap['history_pts']      = len(history)
          snap['history_days']     = round(len(history) * 5 / 1440, 1)
          snap['current_hour_cdt'] = current_hour
          snap['rate_adjustment']  = rate_adj

          with open('data.json', 'w') as f:
            json.dump(snap, f, indent=2)
          with open(HISTORY_FILE, 'w') as f:
            json.dump(history, f)

          print("✓ Wrote data.json and history.json")
          PYEOF

      - name: Commit and push
        run: |
          git config user.name "ERCOT Data Bot"
          git config user.email "action@github.com"
          git add data.json history.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "ERCOT ESR $(date -u +'%H:%M UTC')"
            git push
            echo "✓ Pushed update"
          fi

      - name: Schedule health check
        run: |
          echo "Run completed at $(date -u)"
          echo "Next scheduled run: ~5 minutes"
# Trigger Wed Apr  8 20:10:53 UTC 2026
