name: Fetch ERCOT ESR Data

on:
  schedule:
    - cron: '0,10,20,30,40,50 * * * *'
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write
  actions: write

jobs:
  # Job 1: Fast fetch — completes in ~30 seconds
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 4
    concurrency:
      group: ercot-fetch
      cancel-in-progress: false
    outputs:
      did_fetch: ${{ steps.throttle.outputs.skip == 'false' && 'true' || 'false' }}

    steps:
      - name: Checkout gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          fetch-depth: 1

      - name: Throttle check
        id: throttle
        run: |
          python3 - << 'PYEOF'
          import json, datetime, os
          try:
            with open('data.json') as f:
              d = json.load(f)
            last = datetime.datetime.fromisoformat(
              d.get('fetched_utc','2000-01-01').replace('Z','+00:00'))
            if last.tzinfo is None:
              last = last.replace(tzinfo=datetime.timezone.utc)
            age = (datetime.datetime.now(datetime.timezone.utc) - last).total_seconds() / 60
            print(f"Last fetch: {age:.1f} min ago")
            skip = 'true' if age < 4 else 'false'
          except Exception as e:
            print(f"Check failed ({e}) — proceeding")
            skip = 'false'
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
            f.write(f"skip={skip}\n")
          PYEOF

      - name: Fetch ERCOT + update history
        if: steps.throttle.outputs.skip != 'true'
        run: |
          python3 - << 'PYEOF'
          import urllib.request, json, datetime, sys
          from collections import defaultdict

          BASE = 'https://www.ercot.com/api/1/services/read/dashboards/energy-storage-resources.json'
          HEADERS = {
            'Accept': 'application/json',
            'User-Agent': 'Mozilla/5.0 (compatible; ERCOT-Fetcher/2.0)',
            'Referer': 'https://www.ercot.com/gridmktinfo/dashboards/energystorageresources'
          }
          now_utc = datetime.datetime.now(datetime.timezone.utc)
          cdt     = datetime.timezone(datetime.timedelta(hours=-5))
          now_cdt = now_utc.astimezone(cdt)

          try:
            req = urllib.request.Request(BASE, headers=HEADERS)
            with urllib.request.urlopen(req, timeout=12) as r:
              raw = json.loads(r.read())
            current = raw.get('currentDay',  {}).get('data', []) or []
            prev    = raw.get('previousDay', {}).get('data', []) or []
            all_pts = prev + current
            latest  = current[-1] if current else (prev[-1] if prev else {})
            dis = round(abs(float(latest.get('totalDischarging', 0))))
            chg = round(abs(float(latest.get('totalCharging',    0))))
            net = round(float(latest.get('netOutput', dis - chg)))
            ts  = latest.get('timestamp', now_cdt.isoformat())
            print(f"D={dis}MW C={chg}MW Net={net}MW")
            status = 'live'
          except Exception as e:
            print(f"Error: {e}", file=sys.stderr)
            dis, chg, net, ts, all_pts = 0, 0, 0, now_cdt.isoformat(), []
            status = 'error'

          HISTORY_FILE = 'history_hourly.json'
          try:
            with open(HISTORY_FILE) as f:
              hourly_hist = json.load(f)
          except Exception:
            hourly_hist = {}

          for pt in all_pts:
            try:
              ts_str = pt.get('timestamp', '')
              bucket = ts_str[:13]
              if not bucket: continue
              d_ = abs(float(pt.get('totalDischarging', 0)))
              c_ = abs(float(pt.get('totalCharging',    0)))
              n_ = float(pt.get('netOutput', d_ - c_))
              if bucket not in hourly_hist:
                hourly_hist[bucket] = {'dis':0,'chg':0,'net':0,'n':0}
              b = hourly_hist[bucket]
              b['dis'] = round((b['dis']*b['n'] + d_) / (b['n']+1))
              b['chg'] = round((b['chg']*b['n'] + c_) / (b['n']+1))
              b['net'] = round((b['net']*b['n'] + n_) / (b['n']+1))
              b['n']  += 1
            except Exception:
              pass

          cutoff      = (now_utc - datetime.timedelta(days=10)).strftime('%Y-%m-%d %H')
          hourly_hist = {k:v for k,v in hourly_hist.items() if k >= cutoff}
          n_days      = len(hourly_hist) / 24

          hour_nets = defaultdict(list)
          for bucket, v in hourly_hist.items():
            try:
              hr = int(bucket[11:13])
              hour_nets[hr].append(v['net'])
            except Exception:
              pass
          hourly_avg_net = {hr: round(sum(v)/len(v)) for hr, v in hour_nets.items() if v}

          spring_prior = {0:48,1:46,2:44,3:42,4:40,5:40,6:45,7:52,8:60,9:68,
            10:76,11:83,12:88,13:91,14:92,15:90,16:82,17:65,18:45,19:30,
            20:22,21:18,22:20,23:26}

          if n_days >= 1.0 and len(hourly_avg_net) >= 12:
            soc_raw, cum = [], 0
            for hr in range(24):
              cum += -(hourly_avg_net.get(hr, 0))
              soc_raw.append(cum)
            r_min, r_max = min(soc_raw), max(soc_raw)
            r_rng = r_max - r_min if r_max != r_min else 1
            hourly_soc = {hr: round(10 + ((soc_raw[hr]-r_min)/r_rng)*82) for hr in range(24)}
          else:
            hourly_soc = spring_prior

          cur_hr        = now_cdt.hour
          history_soc   = hourly_soc.get(cur_hr, 50)
          typical_net   = hourly_avg_net.get(cur_hr, 0)
          rate_adj      = max(-15, min(15, -round((net - typical_net)/1000*2.5)))
          estimated_soc = max(5, min(98, history_soc + rate_adj))

          out = {
            'discharge_mw': dis, 'charge_mw': chg, 'net_mw': net,
            'timestamp': ts, 'status': status,
            'source': 'ERCOT ESR Dashboard (live)',
            'fetched_utc': now_utc.isoformat(),
            'estimated_soc': estimated_soc,
            'history_soc': history_soc,
            'hourly_soc': hourly_soc,
            'hourly_avg_net': {str(k):v for k,v in hourly_avg_net.items()},
            'history_pts': len(hourly_hist) * 12,
            'history_days': round(n_days, 1),
            'current_hour_cdt': cur_hr,
            'rate_adjustment': rate_adj,
          }
          with open('data.json',  'w') as f: json.dump(out,         f, indent=2)
          with open(HISTORY_FILE, 'w') as f: json.dump(hourly_hist, f)
          print(f"SoC: {estimated_soc}% | History: {len(hourly_hist)} buckets")
          PYEOF

      - name: Commit and push
        if: steps.throttle.outputs.skip != 'true'
        run: |
          git config user.name "ERCOT Data Bot"
          git config user.email "action@github.com"
          git add data.json history_hourly.json
          git diff --staged --quiet || git commit -m "ERCOT ESR $(date -u +'%H:%M UTC')" && git push || true

  # Job 2: Runs after fetch, waits 5 min, then dispatches next fetch
  # Separate job so GitHub doesn't cancel it when fetch completes
  redispatch:
    needs: fetch
    runs-on: ubuntu-latest
    timeout-minutes: 7
    # Only chain if this was a real fetch (not throttled, not a push trigger)
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    steps:
      - name: Wait 5 minutes then trigger next run
        run: |
          echo "Fetch complete. Waiting 5 min to dispatch next run..."
          sleep 300
          curl -s -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/fetch-ercot.yml/dispatches" \
            -d '{"ref":"main"}' \
            && echo "✓ Next run dispatched at $(date -u +'%H:%M UTC')" \
            || echo "Dispatch failed — cron will recover"
