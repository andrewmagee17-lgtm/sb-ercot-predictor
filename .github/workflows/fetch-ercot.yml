name: Fetch ERCOT ESR Data

on:
  schedule:
    - cron: '0,5,10,15,20,25,30,35,40,45,50,55 * * * *'
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 4
    steps:
      - name: Checkout gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          # Shallow clone — no history needed, keeps checkout fast
          fetch-depth: 1

      - name: Fetch + update
        run: |
          python3 - << 'PYEOF'
          import urllib.request, json, datetime, sys
          from collections import defaultdict

          BASE = 'https://www.ercot.com/api/1/services/read/dashboards/energy-storage-resources.json'
          HEADERS = {
            'Accept': 'application/json',
            'User-Agent': 'Mozilla/5.0 (compatible; ERCOT-Fetcher/2.0)',
            'Referer': 'https://www.ercot.com/gridmktinfo/dashboards/energystorageresources'
          }

          now_utc = datetime.datetime.now(datetime.timezone.utc)
          cdt     = datetime.timezone(datetime.timedelta(hours=-5))
          now_cdt = now_utc.astimezone(cdt)
          print(f"Run at {now_utc:%H:%M:%S UTC} / {now_cdt:%H:%M CDT}")

          # ── Fetch ERCOT ────────────────────────────────────────
          try:
            req = urllib.request.Request(BASE, headers=HEADERS)
            with urllib.request.urlopen(req, timeout=12) as r:
              raw = json.loads(r.read())

            current = raw.get('currentDay',  {}).get('data', []) or []
            prev    = raw.get('previousDay', {}).get('data', []) or []
            all_pts = prev + current
            latest  = current[-1] if current else (prev[-1] if prev else {})

            dis = round(abs(float(latest.get('totalDischarging', 0))))
            chg = round(abs(float(latest.get('totalCharging',    0))))
            net = round(float(latest.get('netOutput', dis - chg)))
            ts  = latest.get('timestamp', now_cdt.isoformat())
            print(f"ERCOT: D={dis}MW C={chg}MW Net={net}MW @ {ts}")
            status = 'live'

          except Exception as e:
            print(f"ERCOT fetch error: {e}", file=sys.stderr)
            dis, chg, net, ts, all_pts = 0, 0, 0, now_cdt.isoformat(), []
            status = 'error'

          # ── Load compact history (hourly buckets, not raw 5-min) ──
          # Format: { "YYYY-MM-DD HH": {dis, chg, net, n} }
          # Max size: 10 days * 24 hours = 240 entries (~15KB vs 160KB)
          HISTORY_FILE = 'history_hourly.json'
          try:
            with open(HISTORY_FILE) as f:
              hourly_hist = json.load(f)
          except Exception:
            hourly_hist = {}

          # Add new raw points into hourly buckets
          for pt in all_pts:
            try:
              ts_str = pt.get('timestamp', '')
              # Parse hour bucket key
              if '-' in ts_str[10:]:
                dt = datetime.datetime.fromisoformat(ts_str)
                hr = dt.hour
              else:
                hr = int(ts_str[11:13])
              d_ = abs(float(pt.get('totalDischarging', 0)))
              c_ = abs(float(pt.get('totalCharging',    0)))
              n_ = float(pt.get('netOutput', d_ - c_))
              # Use date+hour as bucket key (CDT)
              bucket = ts_str[:13]  # "YYYY-MM-DD HH"
              if bucket not in hourly_hist:
                hourly_hist[bucket] = {'dis':0,'chg':0,'net':0,'n':0}
              b = hourly_hist[bucket]
              b['dis'] = round((b['dis']*b['n'] + d_) / (b['n']+1))
              b['chg'] = round((b['chg']*b['n'] + c_) / (b['n']+1))
              b['net'] = round((b['net']*b['n'] + n_) / (b['n']+1))
              b['n'] += 1
            except Exception:
              pass

          # Trim to last 10 days
          cutoff = (now_utc - datetime.timedelta(days=10)).strftime('%Y-%m-%d %H')
          hourly_hist = {k:v for k,v in hourly_hist.items() if k >= cutoff}
          print(f"Hourly history: {len(hourly_hist)} buckets ({len(hourly_hist)/24:.1f} days)")

          # ── Build 24h SoC profile from hourly averages ─────────
          hour_nets = defaultdict(list)
          for bucket, v in hourly_hist.items():
            try:
              hr = int(bucket[11:13])
              hour_nets[hr].append(v['net'])
            except Exception:
              pass

          hourly_avg_net = {hr: round(sum(v)/len(v)) for hr, v in hour_nets.items() if v}

          spring_prior = {
            0:48,1:46,2:44,3:42,4:40,5:40,
            6:45,7:52,8:60,9:68,10:76,11:83,
            12:88,13:91,14:92,15:90,16:82,
            17:65,18:45,19:30,20:22,21:18,
            22:20,23:26
          }

          n_days = len(hourly_hist) / 24
          if n_days >= 1.0 and len(hourly_avg_net) >= 12:
            # Integrate -net to get SoC curve
            soc_raw, cum = [], 0
            for hr in range(24):
              cum += -(hourly_avg_net.get(hr, 0))
              soc_raw.append(cum)
            r_min, r_max = min(soc_raw), max(soc_raw)
            r_range = r_max - r_min if r_max != r_min else 1
            hourly_soc = {hr: round(10 + ((soc_raw[hr]-r_min)/r_range)*82) for hr in range(24)}
            print("SoC: history-derived curve")
          else:
            hourly_soc = spring_prior
            print("SoC: spring prior (insufficient history)")

          # Current SoC
          cur_hr       = now_cdt.hour
          history_soc  = hourly_soc.get(cur_hr, 50)
          typical_net  = hourly_avg_net.get(cur_hr, 0)
          rate_adj     = max(-15, min(15, -round((net - typical_net) / 1000 * 2.5)))
          estimated_soc = max(5, min(98, history_soc + rate_adj))

          print(f"Hour {cur_hr} CDT | SoC: {history_soc}% base + {rate_adj:+}% = {estimated_soc}%")

          # ── Write data.json ────────────────────────────────────
          out = {
            'discharge_mw':    dis,
            'charge_mw':       chg,
            'net_mw':          net,
            'timestamp':       ts,
            'status':          status,
            'source':          'ERCOT ESR Dashboard (live)',
            'fetched_utc':     now_utc.isoformat(),
            'estimated_soc':   estimated_soc,
            'history_soc':     history_soc,
            'hourly_soc':      hourly_soc,
            'hourly_avg_net':  {str(k):v for k,v in hourly_avg_net.items()},
            'history_pts':     len(hourly_hist) * 12,   # approx 5-min equiv
            'history_days':    round(n_days, 1),
            'current_hour_cdt': cur_hr,
            'rate_adjustment': rate_adj,
          }

          with open('data.json', 'w') as f:
            json.dump(out, f, indent=2)
          with open(HISTORY_FILE, 'w') as f:
            json.dump(hourly_hist, f)

          print(f"✓ Written data.json + {HISTORY_FILE} ({len(hourly_hist)} buckets)")
          PYEOF

      - name: Commit and push
        run: |
          git config user.name "ERCOT Data Bot"
          git config user.email "action@github.com"
          git add data.json history_hourly.json
          if git diff --staged --quiet; then
            echo "No changes"
          else
            git commit -m "ERCOT ESR $(date -u +'%H:%M UTC')"
            git push
            echo "✓ Pushed"
          fi
